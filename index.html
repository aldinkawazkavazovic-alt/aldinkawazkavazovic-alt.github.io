    // Shim: convert Lucide UMD icons to React components
    const makeLucideIcon = (name) => {
      return ({ className = "", style = {}, ...props }) => {
        const iconData = lucide[name];
        if (!iconData) return null;
        const [tag, attrs, ...children] = iconData;
        const svgProps = {
          ...attrs,
          className,
          style,
          xmlns: "http://www.w3.org/2000/svg",
          viewBox: "0 0 24 24",
          fill: "none",
          stroke: "currentColor",
          strokeWidth: "2",
          strokeLinecap: "round",
          strokeLinejoin: "round",
        };
        const renderChildren = (nodes) =>
          (nodes || []).map(([t, a], i) => React.createElement(t, { key: i, ...a }));
        return React.createElement("svg", svgProps, ...renderChildren(children));
      };
    };

                                      className="font-mono text-[9px] uppercase tracking-wider px-1.5 py-0.5 border hover:bg-stone-900 hover:text-stone-50 transition"
                                      style={{ borderColor: rd.color, color: activeRole === r ? "#fff" : rd.color, backgroundColor: activeRole === r ? rd.color : "transparent" }}>
                                      {rd.short}
                                    </button>
                                  );
                                })}
                              </div>
                            </div>
                            <ul className="mt-3 space-y-1.5">
                              {exp.bullets.map((b, i) => (
                                <li key={i} className="flex gap-2.5 text-sm text-stone-700 leading-relaxed">
                                  <span className="text-stone-400 mt-1">▸</span>
                                  <span>{b}</span>
                                </li>
                              ))}
                            </ul>
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </section>

          {/* SKILLS + LANGUAGES */}
          <section className="bg-white border-b border-stone-300">
            <div className="max-w-6xl mx-auto px-6 md:px-10 py-12 grid md:grid-cols-12 gap-10">
              <div className="md:col-span-7">
                <div className="flex items-center gap-3 mb-6">
                  <div className="font-mono text-xs uppercase tracking-[0.25em] text-stone-500">§ 03</div>
                  <h2 className="font-display text-2xl md:text-3xl font-normal">Toolbox</h2>
                  <Wrench className="w-4 h-4 text-stone-400" />
                </div>
                <div className="space-y-5">
                  {Object.entries(SKILLS).map(([cat, items]) => (
                    <div key={cat}>
                      <div className="font-mono text-[10px] uppercase tracking-widest text-amber-700 mb-2">{cat}</div>
                      <div className="flex flex-wrap gap-1.5">
                        {items.map((s) => (
                          <span key={s} className="font-mono text-xs px-2.5 py-1 border border-stone-300 hover:border-stone-900 hover:bg-stone-900 hover:text-stone-50 transition cursor-default">{s}</span>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              <div className="md:col-span-5">
                <div className="flex items-center gap-3 mb-6">
                  <div className="font-mono text-xs uppercase tracking-[0.25em] text-stone-500">§ 04</div>
                  <h2 className="font-display text-2xl md:text-3xl font-normal">Languages</h2>
                  <Languages className="w-4 h-4 text-stone-400" />
                </div>
                <div className="space-y-4">
                  {LANGUAGES.map((l) => (
                    <div key={l.name}>
                      <div className="flex justify-between items-baseline mb-1.5">
                        <div className="font-display text-base">{l.name}</div>
                        <div className="font-mono text-[10px] uppercase tracking-wider text-stone-500">{l.level}</div>
                      </div>
                      <div className="h-px bg-stone-200 relative">
                        <div className="absolute top-0 left-0 h-px bg-stone-900" style={{ width: `${l.pct}%`, height: "2px", marginTop: "-0.5px" }} />
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </section>

          {/* AWARDS + EDUCATION */}
          <section className="bg-stone-900 text-stone-50">
            <div className="max-w-6xl mx-auto px-6 md:px-10 py-12 grid md:grid-cols-12 gap-10">
              <div className="md:col-span-7">
                <div className="flex items-center gap-3 mb-6">
                  <div className="font-mono text-xs uppercase tracking-[0.25em] text-stone-500">§ 05</div>
                  <h2 className="font-display text-2xl md:text-3xl font-normal text-stone-50">Honours</h2>
                  <Award className="w-4 h-4 text-amber-500" />
                </div>
                <div className="grid sm:grid-cols-2 gap-3">
                  {AWARDS.map((a) => (
                    <div key={a.title} className="border border-stone-700 p-4 hover:border-amber-500 transition">
                      <div className="font-mono text-[10px] text-amber-500 mb-1">{a.year}</div>
                      <div className="font-display text-base leading-tight mb-1">{a.title}</div>
                      <div className="font-mono text-[10px] text-stone-400">{a.org}</div>
                    </div>
                  ))}
                </div>
              </div>
              <div className="md:col-span-5">
                <div className="flex items-center gap-3 mb-6">
                  <div className="font-mono text-xs uppercase tracking-[0.25em] text-stone-500">§ 06</div>
                  <h2 className="font-display text-2xl md:text-3xl font-normal text-stone-50">Education</h2>
                  <GraduationCap className="w-4 h-4 text-stone-400" />
                </div>
                <div className="space-y-5">
                  <div className="border-l-2 border-amber-500 pl-4">
                    <div className="font-mono text-[10px] text-stone-400 mb-1">2013 – 2017</div>
                    <div className="font-display text-lg leading-tight">B.Sc. Civil Engineering</div>
                    <div className="font-mono text-xs text-stone-400 mt-1">Kocaeli University · Izmit, Turkey</div>
                    <div className="font-mono text-[10px] text-amber-500 mt-1">Top 3 graduate · Highest GPA</div>
                  </div>
                  <div className="border-l-2 border-stone-700 pl-4">
                    <div className="font-mono text-[10px] text-stone-400 mb-1">Sep 2015 – Feb 2016</div>
                    <div className="font-display text-lg leading-tight">Erasmus+ Exchange</div>
                    <div className="font-mono text-xs text-stone-400 mt-1">Università di Pisa · Italy</div>
                  </div>
                  <div className="border-l-2 border-stone-700 pl-4">
                    <div className="font-mono text-[10px] text-stone-400 mb-1">2012 – 2013</div>
                    <div className="font-display text-lg leading-tight">C1 Turkish Diploma</div>
                    <div className="font-mono text-xs text-stone-400 mt-1">Ankara University TÖMER · Bursa</div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* FOOTER */}
          <footer className="bg-stone-950 text-stone-400 border-t border-stone-800">
            <div className="max-w-6xl mx-auto px-6 md:px-10 py-8 flex justify-between items-center flex-wrap gap-4">
              <div className="font-mono text-[10px] uppercase tracking-[0.25em]">© Aldin Kavazović · Drafted Apr 2026</div>
              <div className="font-mono text-[10px] uppercase tracking-[0.25em]">Available worldwide · Open to relocation</div>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<InteractiveCV />);
  </script>
</body>
</html>
